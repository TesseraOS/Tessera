name: CI

# Runs the harness verification gates on every change (ADR-0010, NFR-15).
# Steps mirror .harness/verification/gates.json — keep them in lockstep (effect E-005).
#
# Activation: this workflow runs once the repo has a GitHub remote (today there is none).
# Branch protection on `main` should require the `verify`, `security`, and `secret-scan`
# jobs to pass before merge, so the gates can never be skipped (ADR-0010).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version` input: action-setup@v4 errors if it is set alongside `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Harness state (gate 0)
        run: node scripts/verify-state.mjs

      - name: Typecheck (gate 1)
        run: pnpm typecheck

      - name: Lint (gate 2)
        run: pnpm lint

      - name: Format (gate 3)
        run: pnpm format:check

      - name: Test (gate 4)
        run: pnpm test

      - name: Build (gate 5)
        run: pnpm build

      # The web/marketing/full-stack e2e (gates 6 + 9) drive a real browser via Playwright; install it
      # before running (all three pin the same @playwright/test — one browser build).
      - name: Install Playwright browser (web e2e + a11y + e2e-full)
        run: |
          pnpm --filter @tessera/web exec playwright install --with-deps chromium
          pnpm --filter @tessera/marketing exec playwright install chromium
          pnpm --filter @tessera/e2e-full exec playwright install chromium

      - name: E2E + a11y (gate 6)
        run: pnpm test:e2e

      # Full-stack (gate 9, NFR-16): the real server + an ingested fixture repo, driven by the real
      # dashboard and a real MCP client. Uses ports 3200/3201, so it cannot collide with gate 6.
      - name: Full-stack E2E (gate 9)
        run: pnpm test:e2e:full

      # Frontend budget (gate 8, ADR-0021): first-load JS measured over the wire. Deterministic — it is
      # a byte count, not a timing — so it is safe on shared CI hardware.
      - name: Web performance budgets (gate 8)
        run: pnpm test:perf

      # Backend perf (gate 10, NFR-4): thresholds are absolute and sit orders of magnitude above the
      # measured engine, so this is stable on shared CI hardware rather than a coin flip.
      - name: Performance benchmarks (gate 10)
        run: pnpm bench

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version` input: action-setup@v4 errors if it is set alongside `packageManager`.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit (high+)
        run: pnpm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # Free for personal/public repos; GitHub organisations set GITLEAKS_LICENSE.
