name: CI

# Runs the harness verification gates on every change (ADR-0010, NFR-15).
# Steps mirror .harness/verification/gates.json — keep them in lockstep (effect E-005).
#
# Activation: this workflow runs once the repo has a GitHub remote (today there is none).
# Branch protection on `main` should require the `verify`, `security`, and `secret-scan`
# jobs to pass before merge, so the gates can never be skipped (ADR-0010).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Harness state (gate 0)
        run: node scripts/verify-state.mjs

      - name: Typecheck (gate 1)
        run: pnpm typecheck

      - name: Lint (gate 2)
        run: pnpm lint

      - name: Format (gate 3)
        run: pnpm format:check

      - name: Test (gate 4)
        run: pnpm test

      - name: Build (gate 5)
        run: pnpm build

      # The web e2e (gate 6) drives a real browser via Playwright; install it before running.
      - name: Install Playwright browser (web e2e + a11y)
        run: pnpm --filter @tessera/web exec playwright install --with-deps chromium

      - name: E2E + a11y (gate 6)
        run: pnpm test:e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit (high+)
        run: pnpm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # Free for personal/public repos; GitHub organisations set GITLEAKS_LICENSE.
